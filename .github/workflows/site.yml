name: Site

on:
  push:
    branches: [main]
    paths:
      - "web/site/**"
      - ".github/workflows/site.yml"
  workflow_dispatch:

# Allow this workflow to deploy to GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one in-flight deploy at a time. New pushes cancel old runs.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build site
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web/site
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: "20"

      # We deliberately skip a lockfile (see web/site/.gitignore) because
      # npm's optional-dependency handling breaks cross-platform lockfiles
      # for native bindings like @rolldown/binding-*. A fresh resolve on
      # Linux picks up the right binary every time.
      - name: Install
        run: npm install --no-package-lock

      - name: Build
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web/site/dist

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
