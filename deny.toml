[advisories]
version = 2
yanked = "warn"
ignore = [
    # number_prefix (unmaintained) — pulled in via indicatif. No safe upgrade available upstream.
    "RUSTSEC-2025-0119",
    # proc-macro-error (unmaintained) — pulled in via tabled → tabled_derive. No safe upgrade.
    "RUSTSEC-2024-0370",
]

[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Zlib",
]

[bans]
multiple-versions = "warn"
wildcards = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
